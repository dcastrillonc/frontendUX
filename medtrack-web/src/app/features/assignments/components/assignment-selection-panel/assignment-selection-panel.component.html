<section class="assignment-panel">
  <h3>{{ title }}</h3>

  <div class="assignment-panel__card">
    <label class="assignment-panel__search">
      <img src="/assets/search.svg" alt="" aria-hidden="true" />
      <input type="search" [placeholder]="placeholder" />
    </label>

    <div class="assignment-panel__list">
      <button
        type="button"
        class="assignment-panel__item"
        *ngFor="let item of items"
        [attr.aria-pressed]="item.selected ? 'true' : 'false'"
        [disabled]="item.disabled"
        [class.assignment-panel__item--disabled]="item.disabled"
        (click)="toggleItem(item)"
      >
        <span class="assignment-panel__checkbox" [class.assignment-panel__checkbox--selected]="item.selected">
          <img *ngIf="item.selected" src="/assets/check.svg" alt="" aria-hidden="true" />
        </span>
        <span class="assignment-panel__item-label" [class.assignment-panel__item-label--disabled]="item.disabled">
          {{ item.label }}
        </span>
      </button>
    </div>
  </div>
</section>
