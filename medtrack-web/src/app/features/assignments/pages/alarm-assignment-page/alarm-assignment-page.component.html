<app-shell title="" leadingIcon="arrow.svg" [titleRoute]="backRoute">
  <section class="alarm-assignment-page">
    <div class="alarm-assignment-page__content">
      <header class="alarm-assignment-page__header">
        <h2>{{ title }}</h2>
        <p>Seleccione los pacientes y tratamientos para asignar las alarmas correspondientes.</p>
      </header>

      <div class="alarm-assignment-page__grid">
        <app-assignment-selection-panel
          title="Pacientes"
          placeholder="Search"
          [items]="patients"
        ></app-assignment-selection-panel>

        <app-assignment-selection-panel
          title="Tratamientos"
          placeholder="Search"
          [items]="treatments"
        ></app-assignment-selection-panel>
      </div>

      <div class="alarm-assignment-page__actions">
        <button class="alarm-assignment-page__accept-btn" (click)="onAccept()">
          ACEPTAR
        </button>
      </div>
    </div>
  </section>
</app-shell>

<!-- Modal de éxito -->
<div *ngIf="showSuccess" class="alarm-assignment-page__modal-overlay">
  <div class="alarm-assignment-page__modal-card">
    <div class="alarm-assignment-page__modal-icon">
      <img src="assets/check.svg" alt="Éxito" />
    </div>
    <h3 class="alarm-assignment-page__modal-title">Ajustado con éxito</h3>
    <a routerLink="/cuidador" class="alarm-assignment-page__modal-btn">
      Aceptar
    </a>
  </div>
</div>
