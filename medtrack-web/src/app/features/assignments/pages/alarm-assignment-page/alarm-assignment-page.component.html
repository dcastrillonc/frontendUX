<app-shell title="" leadingIcon="arrow.svg" [titleRoute]="backRoute">
  <section class="alarm-assignment-page">
    <div class="alarm-assignment-page__content">
      <header class="alarm-assignment-page__header">
        <h2>{{ title }}</h2>
        <p>Seleccione los pacientes y tratamientos para asignar las alarmas correspondientes.</p>
      </header>

      <div class="alarm-assignment-page__grid">
        <app-assignment-selection-panel
          title="Pacientes"
          placeholder="Search"
          [items]="patients"
        ></app-assignment-selection-panel>

        <app-assignment-selection-panel
          title="Tratamientos"
          placeholder="Search"
          [items]="treatments"
        ></app-assignment-selection-panel>
      </div>

      <div class="alarm-assignment-page__actions">
        <a [routerLink]="backRoute" class="alarm-assignment-page__accept-link">
          <app-primary-action-button
            label="ACEPTAR"
            [iconSrc]="null"
            [compact]="true"
          ></app-primary-action-button>
        </a>
      </div>
    </div>
  </section>
</app-shell>
